name: Build
on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: pwsh

env:
  VERSION: 2.0.8
  PNGOUT_VERSION: 1.0.0 # http://advsys.net/ken/utils.htm#pngout - manual version
  ZOPFLI_VERSION: "1.0.3" # https://github.com/google/zopfli/tags
  OXIPNG_VERSION: "10.1.1" # https://github.com/shssoichiro/oxipng/releases
  FFMPEG_VERSION: "8.1" # https://github.com/BtbN/FFmpeg-Builds/releases

jobs:
  create-release:
    runs-on: ubuntu-latest
    needs: [
      versions_json,
      zopfli-linux,
      zopfli-linux-arm64,
      zopfli-windows,
      zopfli-osx-arm64,
      oxipng-linux,
      oxipng-linux-arm64,
      oxipng-windows,
      oxipng-osx-arm64,
      ffmpeg-linux,
      ffmpeg-linux-arm64,
      ffmpeg-windows,
      ffmpeg-windows-arm64,
      pngout-linux,
      pngout-linux-arm64,
      pngout-windows,
      pngout-osx-arm64
    ]
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - id: download_release_artifacts
      continue-on-error: true
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        pattern: '*'
        path: binaries
        merge-multiple: true
    - if: steps.download_release_artifacts.outcome == 'failure'
      run: Remove-Item -LiteralPath binaries -Recurse -Force -ErrorAction SilentlyContinue
    - if: steps.download_release_artifacts.outcome == 'failure'
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        pattern: '*'
        path: binaries
        merge-multiple: true
    - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: 'gh release create "${{ env.VERSION }}" --target "${{ github.sha }}" ./binaries/*'
      env:
        GH_TOKEN: ${{ github.token }}

  versions_json:
    runs-on: ubuntu-latest
    steps:
    - run: |
        $versions = @{}
        $versions.Zopfli = "${{ env.ZOPFLI_VERSION }}"
        $versions.Oxipng = "${{ env.OXIPNG_VERSION }}"
        $versions.FFmpeg = "${{ env.FFMPEG_VERSION }}"
        $versions.Pngout = "${{ env.PNGOUT_VERSION }}"
        ConvertTo-Json $versions | Out-File versions.json
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-versions
        if-no-files-found: error
        retention-days: 1
        path: 'versions.json'

  zopfli-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        repository: google/zopfli
        ref: zopfli-${{ env.ZOPFLI_VERSION }}
    - run: make zopfli
    - run: |
        mv zopfli zopfli-linux-x64
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-zopfli-linux
        if-no-files-found: error
        retention-days: 1
        path: zopfli-linux-x64

  zopfli-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        repository: google/zopfli
        ref: zopfli-${{ env.ZOPFLI_VERSION }}
    - run: make zopfli
    - run: |
        mv zopfli zopfli-linux-arm64
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-zopfli-linux-arm64
        if-no-files-found: error
        retention-days: 1
        path: zopfli-linux-arm64

  zopfli-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        repository: google/zopfli
        ref: zopfli-${{ env.ZOPFLI_VERSION }}
    - name: Enable Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      with:
        arch: x64
    - run: |
        foreach($item in (Get-ChildItem src\zopfli -Filter *.c -Recurse)) {
          Write-Host "Compiling $item"
          & cl -nologo -O2 /GL /GS- /I$env:CRT_INC_PATH /I. -c /MD /DNDEBUG "$item"
        }

        Write-Host "Linking zopfli.exe"
        & link -nologo /LTCG /OUT:zopfli.exe *.obj user32.lib advapi32.lib kernel32.lib

        Move-Item zopfli.exe zopfli-win-x64.exe
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-zopfli-windows
        if-no-files-found: error
        retention-days: 1
        path: zopfli-win-x64.exe

  zopfli-osx-arm64:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        repository: google/zopfli
        ref: zopfli-${{ env.ZOPFLI_VERSION }}
    - run: make zopfli
    - run: |
        Move-Item zopfli zopfli-osx-arm64
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-zopfli-osx-arm64
        if-no-files-found: error
        retention-days: 1
        path: zopfli-osx-arm64

  oxipng-windows:
    runs-on: ubuntu-latest
    steps:
    - run: |
       $uri = 'https://github.com/shssoichiro/oxipng/releases/download/v${{ env.OXIPNG_VERSION }}/oxipng-${{ env.OXIPNG_VERSION }}-x86_64-pc-windows-msvc.zip'
       $archivePath = "oxipng.zip"
       for ($attempt = 1; $attempt -le 5; $attempt++) {
         try {
           Invoke-WebRequest -Uri $uri -OutFile $archivePath -ErrorAction Stop
         } catch {
           if ($attempt -eq 5) {
             throw
           }
           Start-Sleep -Seconds (2 * $attempt)
           continue
         }
         & unzip -tqq $archivePath *> $null
         if ($LASTEXITCODE -eq 0) {
           break
         }
         if ($attempt -eq 5) {
           throw "Failed to download a valid oxipng archive after $attempt attempts"
         }
         Remove-Item -LiteralPath $archivePath -Force -ErrorAction SilentlyContinue
         Start-Sleep -Seconds (2 * $attempt)
       }
    - run: Expand-Archive oxipng.zip -DestinationPath .
    - run: |
        Get-ChildItem -Path ".\" -Recurse -Filter "oxipng.exe" | Copy-Item -Destination ".\"
        Move-Item oxipng.exe oxipng-win-x64.exe
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-oxipng-windows
        if-no-files-found: error
        retention-days: 1
        path: 'oxipng-win-x64.exe'

  oxipng-linux:
    runs-on: ubuntu-latest
    steps:
    - run: |
       $uri = 'https://github.com/shssoichiro/oxipng/releases/download/v${{ env.OXIPNG_VERSION }}/oxipng-${{ env.OXIPNG_VERSION }}-x86_64-unknown-linux-musl.tar.gz'
       $archivePath = "oxipng.tar.gz"
       for ($attempt = 1; $attempt -le 5; $attempt++) {
         try {
           Invoke-WebRequest -Uri $uri -OutFile $archivePath -ErrorAction Stop
         } catch {
           if ($attempt -eq 5) {
             throw
           }
           Start-Sleep -Seconds (2 * $attempt)
           continue
         }
         & tar -tzf $archivePath *> $null
         if ($LASTEXITCODE -eq 0) {
           break
         }
         if ($attempt -eq 5) {
           throw "Failed to download a valid oxipng archive after $attempt attempts"
         }
         Remove-Item -LiteralPath $archivePath -Force -ErrorAction SilentlyContinue
         Start-Sleep -Seconds (2 * $attempt)
       }
    - run: tar -xvf oxipng.tar.gz
    - run: mv oxipng-*-x86_64-unknown-linux-musl/oxipng oxipng-linux-x64
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-oxipng-linux
        if-no-files-found: error
        retention-days: 1
        path: 'oxipng-linux-x64'

  oxipng-linux-arm64:
    runs-on: ubuntu-latest
    steps:
    - run: |
       $uri = 'https://github.com/shssoichiro/oxipng/releases/download/v${{ env.OXIPNG_VERSION }}/oxipng-${{ env.OXIPNG_VERSION }}-aarch64-unknown-linux-musl.tar.gz'
       $archivePath = "oxipng.tar.gz"
       for ($attempt = 1; $attempt -le 5; $attempt++) {
         try {
           Invoke-WebRequest -Uri $uri -OutFile $archivePath -ErrorAction Stop
         } catch {
           if ($attempt -eq 5) {
             throw
           }
           Start-Sleep -Seconds (2 * $attempt)
           continue
         }
         & tar -tzf $archivePath *> $null
         if ($LASTEXITCODE -eq 0) {
           break
         }
         if ($attempt -eq 5) {
           throw "Failed to download a valid oxipng archive after $attempt attempts"
         }
         Remove-Item -LiteralPath $archivePath -Force -ErrorAction SilentlyContinue
         Start-Sleep -Seconds (2 * $attempt)
       }
    - run: tar -xvf oxipng.tar.gz
    - run: mv oxipng-*-aarch64-unknown-linux-musl/oxipng oxipng-linux-arm64
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-oxipng-linux-arm64
        if-no-files-found: error
        retention-days: 1
        path: 'oxipng-linux-arm64'

  oxipng-osx-arm64:
    runs-on: ubuntu-latest
    steps:
    - run: |
       $uri = 'https://github.com/shssoichiro/oxipng/releases/download/v${{ env.OXIPNG_VERSION }}/oxipng-${{ env.OXIPNG_VERSION }}-aarch64-apple-darwin.tar.gz'
       $archivePath = "oxipng.tar.gz"
       for ($attempt = 1; $attempt -le 5; $attempt++) {
         try {
           Invoke-WebRequest -Uri $uri -OutFile $archivePath -ErrorAction Stop
         } catch {
           if ($attempt -eq 5) {
             throw
           }
           Start-Sleep -Seconds (2 * $attempt)
           continue
         }
         & tar -tzf $archivePath *> $null
         if ($LASTEXITCODE -eq 0) {
           break
         }
         if ($attempt -eq 5) {
           throw "Failed to download a valid oxipng archive after $attempt attempts"
         }
         Remove-Item -LiteralPath $archivePath -Force -ErrorAction SilentlyContinue
         Start-Sleep -Seconds (2 * $attempt)
       }
    - run: tar -xvf oxipng.tar.gz
    - run: mv oxipng-*-aarch64-apple-darwin/oxipng oxipng-osx-arm64
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-oxipng-osx-arm64
        if-no-files-found: error
        retention-days: 1
        path: 'oxipng-osx-arm64'

  pngout-windows:
    runs-on: ubuntu-latest
    steps:
    - run: Invoke-WebRequest -Uri 'http://advsys.net/ken/util/pngout.exe' -OutFile pngout.exe
    - run: Move-Item pngout.exe pngout-win-x64.exe
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-pngout-windows
        if-no-files-found: error
        retention-days: 1
        path: pngout-win-x64.exe

  pngout-linux:
    runs-on: ubuntu-latest
    steps:
    - run: Invoke-WebRequest -Uri 'https://www.jonof.id.au/files/kenutils/pngout-20200115-linux.tar.gz' -OutFile pngout.tar.gz
    - run: tar -xvf pngout.tar.gz
    - run: mv pngout-*/amd64/pngout pngout-linux-x64
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-pngout-linux
        if-no-files-found: error
        retention-days: 1
        path: pngout-linux-x64

  pngout-linux-arm64:
    runs-on: ubuntu-latest
    steps:
    - run: Invoke-WebRequest -Uri 'https://www.jonof.id.au/files/kenutils/pngout-20200115-linux.tar.gz' -OutFile pngout.tar.gz
    - run: tar -xvf pngout.tar.gz
    - run: mv pngout-*/aarch64/pngout pngout-linux-arm64
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-pngout-linux-arm64
        if-no-files-found: error
        retention-days: 1
        path: pngout-linux-arm64

  pngout-osx-arm64:
    runs-on: ubuntu-latest
    steps:
    - run: Invoke-WebRequest -Uri 'https://www.jonof.id.au/files/kenutils/pngout-20230322-mac.zip' -OutFile pngout.zip
    - run: |
        Expand-Archive pngout.zip -DestinationPath . -Force
        $pngout = Get-ChildItem -Path "." -Recurse -File -Filter "pngout" | Select-Object -First 1
        if (-not $pngout) {
          throw "pngout binary not found in macOS archive"
        }

        Move-Item -LiteralPath $pngout.FullName -Destination "./pngout-osx-arm64"
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-pngout-osx-arm64
        if-no-files-found: error
        retention-days: 1
        path: pngout-osx-arm64

  ffmpeg-windows:
    runs-on: ubuntu-latest
    steps:
    - run: |
       $headers = @{
         "User-Agent" = "GitHub Actions"
         "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
       }

        $release = Invoke-RestMethod -Method Get -Uri https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/tags/latest -Headers $headers
        $WindowsAsset = $release.assets | Where-Object { $_.name -cmatch '^ffmpeg-.*-win64-gpl-${{ env.FFMPEG_VERSION }}.zip$' }
        Invoke-WebRequest -Uri $WindowsAsset.browser_download_url -OutFile ffmpeg.zip
        Expand-Archive ffmpeg.zip -DestinationPath . -Verbose
        Get-ChildItem -Recurse -Include ffmpeg.exe, ffprobe.exe | Foreach-Object { Move-Item -LiteralPath $_ -Destination . }
        Move-Item ffmpeg.exe ffmpeg-win-x64.exe
        Move-Item ffprobe.exe ffprobe-win-x64.exe
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-ffmpeg-windows
        if-no-files-found: error
        retention-days: 1
        path: |
           ffmpeg-win-x64.exe
           ffprobe-win-x64.exe

  ffmpeg-windows-arm64:
    runs-on: ubuntu-latest
    steps:
    - run: |
       $headers = @{
         "User-Agent" = "GitHub Actions"
         "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
       }

        $release = Invoke-RestMethod -Method Get -Uri https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/tags/latest -Headers $headers
        $WindowsAsset = $release.assets | Where-Object { $_.name -cmatch '^ffmpeg-.*-winarm64-gpl-${{ env.FFMPEG_VERSION }}.zip$' }
        Invoke-WebRequest -Uri $WindowsAsset.browser_download_url -OutFile ffmpeg.zip
        Expand-Archive ffmpeg.zip -DestinationPath . -Verbose
        Get-ChildItem -Recurse -Include ffmpeg.exe, ffprobe.exe | Foreach-Object { Move-Item -LiteralPath $_ -Destination . }
        Move-Item ffmpeg.exe ffmpeg-win-arm64.exe
        Move-Item ffprobe.exe ffprobe-win-arm64.exe
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-ffmpeg-windows-arm64
        if-no-files-found: error
        retention-days: 1
        path: |
           ffmpeg-win-arm64.exe
           ffprobe-win-arm64.exe

  ffmpeg-linux:
    runs-on: ubuntu-latest
    steps:
    - run: |
       $headers = @{
         "User-Agent" = "GitHub Actions"
         "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
       }

        $release = Invoke-RestMethod -Method Get -Uri https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/tags/latest -Headers $headers
        $LinuxAsset = $release.assets | Where-Object { $_.name -cmatch '^ffmpeg-.*-linux64-gpl-${{ env.FFMPEG_VERSION }}.tar.xz$' }
        Invoke-WebRequest -Uri $LinuxAsset.browser_download_url -OutFile ffmpeg.tar.xz
        tar -xvf ffmpeg.tar.xz
        Get-ChildItem -Recurse -Include ffmpeg, ffprobe | Foreach-Object { Move-Item -LiteralPath $_ -Destination . }
        Move-Item ffmpeg ffmpeg-linux-x64
        Move-Item ffprobe ffprobe-linux-x64
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-ffmpeg-linux
        if-no-files-found: error
        retention-days: 1
        path: |
           ffmpeg-linux-x64
           ffprobe-linux-x64

  ffmpeg-linux-arm64:
    runs-on: ubuntu-latest
    steps:
    - run: |
       $headers = @{
         "User-Agent" = "GitHub Actions"
         "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
       }

        $release = Invoke-RestMethod -Method Get -Uri https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/tags/latest -Headers $headers
        $LinuxAsset = $release.assets | Where-Object { $_.name -cmatch '^ffmpeg-.*-linuxarm64-gpl-${{ env.FFMPEG_VERSION }}.tar.xz$' }
        Invoke-WebRequest -Uri $LinuxAsset.browser_download_url -OutFile ffmpeg.tar.xz
        tar -xvf ffmpeg.tar.xz
        Get-ChildItem -Recurse -Filter ffmpeg | Foreach-Object { Move-Item -LiteralPath $_ -Destination ffmpeg-linux-arm64 }
        Get-ChildItem -Recurse -Filter ffprobe | Foreach-Object { Move-Item -LiteralPath $_ -Destination ffprobe-linux-arm64 }
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: binaries-ffmpeg-linux-arm64
        if-no-files-found: error
        retention-days: 1
        path: |
           ffmpeg-linux-arm64
           ffprobe-linux-arm64

  prebuilt-docker-linux-x64:
    runs-on: ubuntu-latest
    needs: [zopfli-linux, oxipng-linux, pngout-linux, ffmpeg-linux]
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: binaries-zopfli-linux
        path: .
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: binaries-oxipng-linux
        path: .
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: binaries-pngout-linux
        path: .
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: binaries-ffmpeg-linux
        path: .
    - run: |
       @"
       FROM ubuntu:24.04
       COPY --chmod=0755 zopfli-linux-x64 /usr/local/bin/zopfli
       COPY --chmod=0755 oxipng-linux-x64 /usr/local/bin/oxipng
       COPY --chmod=0755 pngout-linux-x64 /usr/local/bin/pngout
       COPY --chmod=0755 ffmpeg-linux-x64 /usr/local/bin/ffmpeg
       COPY --chmod=0755 ffprobe-linux-x64 /usr/local/bin/ffprobe
       "@ | Set-Content -LiteralPath Dockerfile -NoNewline
    - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
    - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: ghcr.io/${{ github.repository_owner }}/prebuilt:${{ env.VERSION }}-linux-x64

  prebuilt-docker-linux-arm64:
    runs-on: ubuntu-latest
    needs: [zopfli-linux-arm64, oxipng-linux-arm64, pngout-linux-arm64, ffmpeg-linux-arm64]
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: binaries-zopfli-linux-arm64
        path: .
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: binaries-oxipng-linux-arm64
        path: .
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: binaries-pngout-linux-arm64
        path: .
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: binaries-ffmpeg-linux-arm64
        path: .
    - run: |
       @"
       FROM ubuntu:24.04
       COPY --chmod=0755 zopfli-linux-arm64 /usr/local/bin/zopfli
       COPY --chmod=0755 oxipng-linux-arm64 /usr/local/bin/oxipng
       COPY --chmod=0755 pngout-linux-arm64 /usr/local/bin/pngout
       COPY --chmod=0755 ffmpeg-linux-arm64 /usr/local/bin/ffmpeg
       COPY --chmod=0755 ffprobe-linux-arm64 /usr/local/bin/ffprobe
       "@ | Set-Content -LiteralPath Dockerfile -NoNewline
    - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
    - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/arm64
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: ghcr.io/${{ github.repository_owner }}/prebuilt:${{ env.VERSION }}-linux-arm64

  prebuilt-docker-manifest:
    runs-on: ubuntu-latest
    needs: [prebuilt-docker-linux-x64, prebuilt-docker-linux-arm64]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
    - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
    - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - run: |
       $registry = "ghcr.io/${{ github.repository_owner }}/prebuilt"
       docker buildx imagetools create `
         --tag "${registry}:${{ env.VERSION }}" `
         --tag "${registry}:latest" `
         "${registry}:${{ env.VERSION }}-linux-x64" `
         "${registry}:${{ env.VERSION }}-linux-arm64"
       docker buildx imagetools inspect "${registry}:${{ env.VERSION }}"
