name: Build
on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: pwsh

env:
  VERSION: 2.0.6
  PNGOUT_VERSION: 1.0.0 # http://advsys.net/ken/utils.htm#pngout - manual version
  ZOPFLI_VERSION: "1.0.3" # https://github.com/google/zopfli/tags
  OXIPNG_VERSION: "10.1.1" # https://github.com/shssoichiro/oxipng/releases
  FFMPEG_VERSION: "8.1" # https://github.com/BtbN/FFmpeg-Builds/releases
  FFMPEG_MACOS_SOURCE_REF: "n8.1" # https://github.com/FFmpeg/FFmpeg/tags (keep aligned with FFMPEG_VERSION)
  AOM_VERSION: "3.13.1" # https://aomedia.googlesource.com/aom
  OPUS_VERSION: "1.5.2" # https://opus-codec.org/downloads/
  SVT_AV1_VERSION: "3.1.2" # https://gitlab.com/AOMediaCodec/SVT-AV1/-/tags
  JXL_VERSION: "0.11.2" # https://github.com/libjxl/libjxl/releases
  BROTLI_VERSION: "1.2.0" # https://github.com/google/brotli/releases
  HWY_VERSION: "1.3.0" # https://github.com/google/highway/releases
  # GPL profile. Nonfree options (for example libfdk-aac) are intentionally excluded.
  FFMPEG_MACOS_CONFIGURE_FLAGS: >-
    --arch=arm64 --target-os=darwin --disable-doc --disable-debug --enable-pthreads
    --enable-runtime-cpudetect --enable-gpl --disable-nonfree --disable-shared --enable-static
    --enable-audiotoolbox --enable-videotoolbox --enable-neon --disable-autodetect --pkg-config-flags=--static
    --enable-libopus --enable-libaom --enable-libjxl --enable-libsvtav1
    --disable-xlib --disable-libxcb --disable-libxcb-shm --disable-libxcb-xfixes --disable-libxcb-shape
  FFMPEG_MACOS_MAKE_JOBS: "4"
  RCLONE_VERSION: "v1.73.5" # https://github.com/rclone/rclone/releases
  IMAGEMAGICK_VERSION: "7.1.2-21" # https://github.com/ImageMagick/ImageMagick/releases/latest

jobs:
  create-release:
    runs-on: ubuntu-latest
    needs: [
      versions_json,
      zopflipng-linux,
      zopflipng-linux-arm64,
      zopflipng-windows,
      zopflipng-osx-arm64,
      oxipng-linux,
      oxipng-linux-arm64,
      oxipng-windows,
      oxipng-osx-arm64,
      ffmpeg-linux,
      ffmpeg-linux-arm64,
      ffmpeg-windows,
      ffmpeg-windows-arm64,
      ffmpeg-osx-arm64,
      ffmpeg-osx-arm64-avif-test,
      pngout-linux,
      pngout-linux-arm64,
      pngout-windows,
      pngout-osx-arm64,
      rclone-windows,
      rclone-linux,
      rclone-linux-arm64,
      rclone-osx-arm64,
      magick-windows
    ]
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
    - id: download_release_artifacts
      continue-on-error: true
      uses: actions/download-artifact@v8
      with:
        pattern: '*'
        path: binaries
        merge-multiple: true
    - if: steps.download_release_artifacts.outcome == 'failure'
      run: Remove-Item -LiteralPath binaries -Recurse -Force -ErrorAction SilentlyContinue
    - if: steps.download_release_artifacts.outcome == 'failure'
      uses: actions/download-artifact@v8
      with:
        pattern: '*'
        path: binaries
        merge-multiple: true
    - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: 'gh release create "${{ env.VERSION }}" --target "${{ github.sha }}" ./binaries/*'
      env:
        GH_TOKEN: ${{ github.token }}

  versions_json:
    runs-on: ubuntu-latest
    steps:
    - run: |
        $versions = @{}
        $versions.Zopfli = "${{ env.ZOPFLI_VERSION }}"
        $versions.Oxipng = "${{ env.OXIPNG_VERSION }}"
        $versions.FFmpeg = "${{ env.FFMPEG_VERSION }}"
        $versions.Pngout = "${{ env.PNGOUT_VERSION }}"
        $versions.Rclone = "${{ env.RCLONE_VERSION }}"
        $versions.ImageMagick = "${{ env.IMAGEMAGICK_VERSION }}"
        ConvertTo-Json $versions | Out-File versions.json
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-versions
        if-no-files-found: error
        retention-days: 1
        path: 'versions.json'

  zopflipng-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        repository: google/zopfli
        ref: zopfli-${{ env.ZOPFLI_VERSION }}
    - run: make zopfli && make zopflipng
    - run: |
        mv zopfli zopfli-linux-x64
        mv zopflipng zopflipng-linux-x64
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-zopflipng-linux
        if-no-files-found: error
        retention-days: 1
        path: |
          zopfli-linux-x64
          zopflipng-linux-x64

  zopflipng-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@v6
      with:
        repository: google/zopfli
        ref: zopfli-${{ env.ZOPFLI_VERSION }}
    - run: make zopfli && make zopflipng
    - run: |
        mv zopfli zopfli-linux-arm64
        mv zopflipng zopflipng-linux-arm64
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-zopflipng-linux-arm64
        if-no-files-found: error
        retention-days: 1
        path: |
          zopfli-linux-arm64
          zopflipng-linux-arm64

  zopflipng-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
      with:
        repository: google/zopfli
        ref: zopfli-${{ env.ZOPFLI_VERSION }}
    - name: Enable Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1.13.0
      with:
        arch: x64
    - run: |
        foreach($item in (Get-ChildItem src\zopfli -Filter *.c -Recurse)) {
          Write-Host "Compiling $item"
          & cl -nologo -O2 /GL /GS- /I$env:CRT_INC_PATH /I. -c /MD /DNDEBUG "$item"
        }

        Write-Host "Linking zopfli.exe"
        & link -nologo /LTCG /OUT:zopfli.exe *.obj user32.lib advapi32.lib kernel32.lib

        Remove-Item zopfli_bin.obj
        foreach($item in (Get-ChildItem src\zopflipng -Filter *.c* -Recurse)) {
          Write-Host "Compiling $item"
          & cl -nologo -O2 /GL /GS- /I$env:CRT_INC_PATH /I. -c /MD /DNDEBUG /EHsc "$item"
        }

        Write-Host "Linking zopflipng.exe"
        & link -nologo /LTCG /OUT:zopflipng.exe *.obj user32.lib advapi32.lib kernel32.lib
        Move-Item zopfli.exe zopfli-win-x64.exe
        Move-Item zopflipng.exe zopflipng-win-x64.exe
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-zopflipng-windows
        if-no-files-found: error
        retention-days: 1
        path: |
          zopfli-win-x64.exe
          zopflipng-win-x64.exe

  zopflipng-osx-arm64:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
      with:
        repository: google/zopfli
        ref: zopfli-${{ env.ZOPFLI_VERSION }}
    - run: make zopfli && make zopflipng
    - run: |
        Move-Item zopfli zopfli-osx-arm64
        Move-Item zopflipng zopflipng-osx-arm64
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-zopflipng-osx-arm64
        if-no-files-found: error
        retention-days: 1
        path: |
          zopfli-osx-arm64
          zopflipng-osx-arm64

  oxipng-windows:
    runs-on: ubuntu-latest
    steps:
    - run: Invoke-WebRequest -Uri 'https://github.com/shssoichiro/oxipng/releases/download/v${{ env.OXIPNG_VERSION }}/oxipng-${{ env.OXIPNG_VERSION }}-x86_64-pc-windows-msvc.zip' -OutFile oxipng.zip
    - run: Expand-Archive oxipng.zip -DestinationPath .
    - run: |
        Get-ChildItem -Path ".\" -Recurse -Filter "oxipng.exe" | Copy-Item -Destination ".\"
        Move-Item oxipng.exe oxipng-win-x64.exe
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-oxipng-windows
        if-no-files-found: error
        retention-days: 1
        path: 'oxipng-win-x64.exe'

  oxipng-linux:
    runs-on: ubuntu-latest
    steps:
    - run: Invoke-WebRequest -Uri 'https://github.com/shssoichiro/oxipng/releases/download/v${{ env.OXIPNG_VERSION }}/oxipng-${{ env.OXIPNG_VERSION }}-x86_64-unknown-linux-musl.tar.gz' -OutFile oxipng.tar.gz
    - run: tar -xvf oxipng.tar.gz
    - run: mv oxipng-*-x86_64-unknown-linux-musl/oxipng oxipng-linux-x64
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-oxipng-linux
        if-no-files-found: error
        retention-days: 1
        path: 'oxipng-linux-x64'

  oxipng-linux-arm64:
    runs-on: ubuntu-latest
    steps:
    - run: Invoke-WebRequest -Uri 'https://github.com/shssoichiro/oxipng/releases/download/v${{ env.OXIPNG_VERSION }}/oxipng-${{ env.OXIPNG_VERSION }}-aarch64-unknown-linux-musl.tar.gz' -OutFile oxipng.tar.gz
    - run: tar -xvf oxipng.tar.gz
    - run: mv oxipng-*-aarch64-unknown-linux-musl/oxipng oxipng-linux-arm64
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-oxipng-linux-arm64
        if-no-files-found: error
        retention-days: 1
        path: 'oxipng-linux-arm64'

  oxipng-osx-arm64:
    runs-on: ubuntu-latest
    steps:
    - run: Invoke-WebRequest -Uri 'https://github.com/shssoichiro/oxipng/releases/download/v${{ env.OXIPNG_VERSION }}/oxipng-${{ env.OXIPNG_VERSION }}-aarch64-apple-darwin.tar.gz' -OutFile oxipng.tar.gz
    - run: tar -xvf oxipng.tar.gz
    - run: mv oxipng-*-aarch64-apple-darwin/oxipng oxipng-osx-arm64
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-oxipng-osx-arm64
        if-no-files-found: error
        retention-days: 1
        path: 'oxipng-osx-arm64'

  pngout-windows:
    runs-on: ubuntu-latest
    steps:
    - run: Invoke-WebRequest -Uri 'http://advsys.net/ken/util/pngout.exe' -OutFile pngout.exe
    - run: Move-Item pngout.exe pngout-win-x64.exe
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-pngout-windows
        if-no-files-found: error
        retention-days: 1
        path: pngout-win-x64.exe

  pngout-linux:
    runs-on: ubuntu-latest
    steps:
    - run: Invoke-WebRequest -Uri 'http://www.jonof.id.au/files/kenutils/pngout-20200115-linux.tar.gz' -OutFile pngout.tar.gz
    - run: tar -xvf pngout.tar.gz
    - run: mv pngout-*/amd64/pngout pngout-linux-x64
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-pngout-linux
        if-no-files-found: error
        retention-days: 1
        path: pngout-linux-x64

  pngout-linux-arm64:
    runs-on: ubuntu-latest
    steps:
    - run: Invoke-WebRequest -Uri 'http://www.jonof.id.au/files/kenutils/pngout-20200115-linux.tar.gz' -OutFile pngout.tar.gz
    - run: tar -xvf pngout.tar.gz
    - run: mv pngout-*/aarch64/pngout pngout-linux-arm64
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-pngout-linux-arm64
        if-no-files-found: error
        retention-days: 1
        path: pngout-linux-arm64

  pngout-osx-arm64:
    runs-on: ubuntu-latest
    steps:
    - run: Invoke-WebRequest -Uri 'https://www.jonof.id.au/files/kenutils/pngout-20230322-mac.zip' -OutFile pngout.zip
    - run: |
        Expand-Archive pngout.zip -DestinationPath . -Force
        $pngout = Get-ChildItem -Path "." -Recurse -File -Filter "pngout" | Select-Object -First 1
        if (-not $pngout) {
          throw "pngout binary not found in macOS archive"
        }

        Move-Item -LiteralPath $pngout.FullName -Destination "./pngout-osx-arm64"
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-pngout-osx-arm64
        if-no-files-found: error
        retention-days: 1
        path: pngout-osx-arm64

  ffmpeg-windows:
    runs-on: ubuntu-latest
    steps:
    - run: |
       $headers = @{
         "User-Agent" = "GitHub Actions"
         "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
       }

        $release = Invoke-RestMethod -Method Get -Uri https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/tags/latest -Headers $headers
        $WindowsAsset = $release.assets | Where-Object { $_.name -cmatch '^ffmpeg-.*-win64-gpl-${{ env.FFMPEG_VERSION }}.zip$' }
        Invoke-WebRequest -Uri $WindowsAsset.browser_download_url -OutFile ffmpeg.zip
        Expand-Archive ffmpeg.zip -DestinationPath . -Verbose
        Get-ChildItem -Recurse -Include ffmpeg.exe, ffprobe.exe | Foreach-Object { Move-Item -LiteralPath $_ -Destination . }
        Move-Item ffmpeg.exe ffmpeg-win-x64.exe
        Move-Item ffprobe.exe ffprobe-win-x64.exe
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-ffmpeg-windows
        if-no-files-found: error
        retention-days: 1
        path: |
           ffmpeg-win-x64.exe
           ffprobe-win-x64.exe

  ffmpeg-windows-arm64:
    runs-on: ubuntu-latest
    steps:
    - run: |
       $headers = @{
         "User-Agent" = "GitHub Actions"
         "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
       }

        $release = Invoke-RestMethod -Method Get -Uri https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/tags/latest -Headers $headers
        $WindowsAsset = $release.assets | Where-Object { $_.name -cmatch '^ffmpeg-.*-winarm64-gpl-${{ env.FFMPEG_VERSION }}.zip$' }
        Invoke-WebRequest -Uri $WindowsAsset.browser_download_url -OutFile ffmpeg.zip
        Expand-Archive ffmpeg.zip -DestinationPath . -Verbose
        Get-ChildItem -Recurse -Include ffmpeg.exe, ffprobe.exe | Foreach-Object { Move-Item -LiteralPath $_ -Destination . }
        Move-Item ffmpeg.exe ffmpeg-win-arm64.exe
        Move-Item ffprobe.exe ffprobe-win-arm64.exe
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-ffmpeg-windows-arm64
        if-no-files-found: error
        retention-days: 1
        path: |
           ffmpeg-win-arm64.exe
           ffprobe-win-arm64.exe

  ffmpeg-linux:
    runs-on: ubuntu-latest
    steps:
    - run: |
       $headers = @{
         "User-Agent" = "GitHub Actions"
         "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
       }

        $release = Invoke-RestMethod -Method Get -Uri https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/tags/latest -Headers $headers
        $LinuxAsset = $release.assets | Where-Object { $_.name -cmatch '^ffmpeg-.*-linux64-gpl-${{ env.FFMPEG_VERSION }}.tar.xz$' }
        Invoke-WebRequest -Uri $LinuxAsset.browser_download_url -OutFile ffmpeg.tar.xz
        tar -xvf ffmpeg.tar.xz
        Get-ChildItem -Recurse -Include ffmpeg, ffprobe | Foreach-Object { Move-Item -LiteralPath $_ -Destination . }
        Move-Item ffmpeg ffmpeg-linux-x64
        Move-Item ffprobe ffprobe-linux-x64
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-ffmpeg-linux
        if-no-files-found: error
        retention-days: 1
        path: |
           ffmpeg-linux-x64
           ffprobe-linux-x64

  ffmpeg-linux-arm64:
    runs-on: ubuntu-latest
    steps:
    - run: |
       $headers = @{
         "User-Agent" = "GitHub Actions"
         "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
       }

        $release = Invoke-RestMethod -Method Get -Uri https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/tags/latest -Headers $headers
        $LinuxAsset = $release.assets | Where-Object { $_.name -cmatch '^ffmpeg-.*-linuxarm64-gpl-${{ env.FFMPEG_VERSION }}.tar.xz$' }
        Invoke-WebRequest -Uri $LinuxAsset.browser_download_url -OutFile ffmpeg.tar.xz
        tar -xvf ffmpeg.tar.xz
        Get-ChildItem -Recurse -Filter ffmpeg | Foreach-Object { Move-Item -LiteralPath $_ -Destination ffmpeg-linux-arm64 }
        Get-ChildItem -Recurse -Filter ffprobe | Foreach-Object { Move-Item -LiteralPath $_ -Destination ffprobe-linux-arm64 }
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-ffmpeg-linux-arm64
        if-no-files-found: error
        retention-days: 1
        path: |
           ffmpeg-linux-arm64
           ffprobe-linux-arm64

  ffmpeg-osx-arm64:
    runs-on: macos-latest
    steps:
    - run: |
       brew install pkg-config cmake ninja nasm

       $depsPrefix = Join-Path (Get-Location) "ffmpeg-deps"
       New-Item -ItemType Directory -Path $depsPrefix -Force | Out-Null

       function Invoke-StaticCMakeBuild([string]$sourcePath, [string]$buildPath, [string[]]$extraOptions) {
         $cmakeConfigureArguments = @(
           "-S", $sourcePath,
           "-B", $buildPath,
           "-G", "Ninja",
           "-DCMAKE_BUILD_TYPE=Release",
           "-DCMAKE_INSTALL_PREFIX=$depsPrefix",
           "-DCMAKE_PREFIX_PATH=$depsPrefix",
           "-DBUILD_SHARED_LIBS=OFF"
         ) + $extraOptions

         & cmake @cmakeConfigureArguments
         if ($LASTEXITCODE -ne 0) {
           throw "cmake configure failed for $sourcePath"
         }

         & cmake --build $buildPath --config Release --parallel ${{ env.FFMPEG_MACOS_MAKE_JOBS }}
         if ($LASTEXITCODE -ne 0) {
           throw "cmake build failed for $sourcePath"
         }

         & cmake --install $buildPath --config Release
         if ($LASTEXITCODE -ne 0) {
           throw "cmake install failed for $sourcePath"
         }
       }

       Invoke-WebRequest -Uri "https://github.com/google/brotli/archive/refs/tags/v${{ env.BROTLI_VERSION }}.tar.gz" -OutFile brotli.tar.gz
       tar -xzf brotli.tar.gz
       Invoke-StaticCMakeBuild -sourcePath "brotli-${{ env.BROTLI_VERSION }}" -buildPath "brotli-build" -extraOptions @(
         "-DBROTLI_DISABLE_TESTS=ON"
       )

       Invoke-WebRequest -Uri "https://github.com/google/highway/archive/refs/tags/${{ env.HWY_VERSION }}.tar.gz" -OutFile highway.tar.gz
       tar -xzf highway.tar.gz
       Invoke-StaticCMakeBuild -sourcePath "highway-${{ env.HWY_VERSION }}" -buildPath "highway-build" -extraOptions @(
         "-DHWY_ENABLE_TESTS=OFF",
         "-DHWY_ENABLE_EXAMPLES=OFF"
       )

       Invoke-WebRequest -Uri "https://storage.googleapis.com/aom-releases/libaom-${{ env.AOM_VERSION }}.tar.gz" -OutFile libaom.tar.gz
       tar -xzf libaom.tar.gz
       Invoke-StaticCMakeBuild -sourcePath "libaom-${{ env.AOM_VERSION }}" -buildPath "libaom-build" -extraOptions @(
         "-DENABLE_DOCS=OFF",
         "-DENABLE_EXAMPLES=OFF",
         "-DENABLE_TESTDATA=OFF",
         "-DENABLE_TESTS=OFF",
         "-DENABLE_TOOLS=OFF"
       )

       Invoke-WebRequest -Uri "https://downloads.xiph.org/releases/opus/opus-${{ env.OPUS_VERSION }}.tar.gz" -OutFile opus.tar.gz
       tar -xzf opus.tar.gz
       Invoke-StaticCMakeBuild -sourcePath "opus-${{ env.OPUS_VERSION }}" -buildPath "opus-build" -extraOptions @(
         "-DOPUS_BUILD_PROGRAMS=OFF",
         "-DOPUS_BUILD_TESTING=OFF",
         "-DOPUS_BUILD_SHARED_LIBRARY=OFF",
         "-DOPUS_BUILD_STATIC_LIBRARY=ON"
       )

       Invoke-WebRequest -Uri "https://gitlab.com/AOMediaCodec/SVT-AV1/-/archive/v${{ env.SVT_AV1_VERSION }}/SVT-AV1-v${{ env.SVT_AV1_VERSION }}.tar.gz" -OutFile svt-av1.tar.gz
       tar -xzf svt-av1.tar.gz
       Invoke-StaticCMakeBuild -sourcePath "SVT-AV1-v${{ env.SVT_AV1_VERSION }}" -buildPath "svt-av1-build" -extraOptions @(
         "-DBUILD_APPS=OFF",
         "-DBUILD_DEC=OFF",
         "-DBUILD_TESTING=OFF",
         "-DSVT_AV1_LTO=OFF"
       )

       Invoke-WebRequest -Uri "https://github.com/libjxl/libjxl/archive/refs/tags/v${{ env.JXL_VERSION }}.tar.gz" -OutFile libjxl.tar.gz
       tar -xzf libjxl.tar.gz
       Invoke-StaticCMakeBuild -sourcePath "libjxl-${{ env.JXL_VERSION }}" -buildPath "libjxl-build" -extraOptions @(
         "-DBUILD_TESTING=OFF",
         "-DJPEGXL_ENABLE_TESTS=OFF",
         "-DJPEGXL_ENABLE_TOOLS=OFF",
         "-DJPEGXL_ENABLE_EXAMPLES=OFF",
         "-DJPEGXL_ENABLE_DOXYGEN=OFF",
         "-DJPEGXL_ENABLE_MANPAGES=OFF",
         "-DJPEGXL_ENABLE_JPEGLI=OFF",
         "-DJPEGXL_ENABLE_BENCHMARK=OFF",
         "-DJPEGXL_ENABLE_SJPEG=OFF",
         "-DJPEGXL_FORCE_SYSTEM_BROTLI=ON",
         "-DJPEGXL_FORCE_SYSTEM_HWY=ON"
       )

       $pkgConfigPaths = @(
         (Join-Path $depsPrefix "lib/pkgconfig"),
         (Join-Path $depsPrefix "lib64/pkgconfig")
       ) | Where-Object { Test-Path -LiteralPath $_ -PathType Container }
       if (-not $pkgConfigPaths) {
         throw "pkg-config directories were not generated in $depsPrefix"
       }

       $pkgConfigPathValue = [string]::Join([IO.Path]::PathSeparator, $pkgConfigPaths)
       $env:PKG_CONFIG_PATH = $pkgConfigPathValue
       $env:PKG_CONFIG_LIBDIR = $pkgConfigPathValue
       $env:CFLAGS = "-I$(Join-Path $depsPrefix 'include')"
       $env:CXXFLAGS = "-I$(Join-Path $depsPrefix 'include')"

       $linkerSearchPaths = @(
         (Join-Path $depsPrefix "lib"),
         (Join-Path $depsPrefix "lib64")
       ) | Where-Object { Test-Path -LiteralPath $_ -PathType Container }
       if (-not $linkerSearchPaths) {
         throw "linker search paths were not generated in $depsPrefix"
       }
       $env:LDFLAGS = (($linkerSearchPaths | ForEach-Object { "-L$_" }) -join ' ')

       $requiredPkgConfigPackages = @('aom', 'opus', 'SvtAv1Enc', 'libjxl')
       foreach ($pkgName in $requiredPkgConfigPackages) {
         & pkg-config --exists $pkgName
         if ($LASTEXITCODE -ne 0) {
           throw "pkg-config package '$pkgName' was not found in static dependency prefix"
         }
       }

       Invoke-WebRequest -Uri "https://github.com/FFmpeg/FFmpeg/archive/refs/tags/${{ env.FFMPEG_MACOS_SOURCE_REF }}.tar.gz" -OutFile ffmpeg.tar.gz
       tar -xzf ffmpeg.tar.gz

       $sourceDirectory = "FFmpeg-${{ env.FFMPEG_MACOS_SOURCE_REF }}"
       if (-not (Test-Path -LiteralPath $sourceDirectory -PathType Container)) {
         throw "ffmpeg source directory not found: $sourceDirectory"
       }

       $configureFlags = "${{ env.FFMPEG_MACOS_CONFIGURE_FLAGS }}" -split '\s+' | Where-Object { $_ }
       Push-Location $sourceDirectory
       & ./configure @configureFlags
       & make -j${{ env.FFMPEG_MACOS_MAKE_JOBS }}

       Move-Item -LiteralPath ./ffmpeg -Destination ../ffmpeg-osx-arm64
       Move-Item -LiteralPath ./ffprobe -Destination ../ffprobe-osx-arm64
       Pop-Location

       chmod +x ffmpeg-osx-arm64
       chmod +x ffprobe-osx-arm64

       function Get-ExternalDependencies([string]$path) {
         return (& otool -L $path | Select-Object -Skip 1 | ForEach-Object {
           ($_ -replace '^\s+', '') -replace '\s+\(.*$',''
         } | Where-Object { $_ -and $_ -notmatch '^/usr/lib/' -and $_ -notmatch '^/System/Library/' })
       }

       function Assert-NoExternalDependencies([string]$binaryName, [string[]]$dependencies) {
         if ($dependencies) {
           throw "$binaryName has non-system dynamic dependencies: $($dependencies -join ', ')"
         }
       }

       $ffmpegExternalDependencies = Get-ExternalDependencies "./ffmpeg-osx-arm64"
       Assert-NoExternalDependencies "ffmpeg-osx-arm64" $ffmpegExternalDependencies
       if ($ffmpegExternalDependencies) {
         Write-Host "ffmpeg-osx-arm64 external dependencies: $($ffmpegExternalDependencies -join ', ')"
       }

       $ffprobeExternalDependencies = Get-ExternalDependencies "./ffprobe-osx-arm64"
       Assert-NoExternalDependencies "ffprobe-osx-arm64" $ffprobeExternalDependencies
       if ($ffprobeExternalDependencies) {
         Write-Host "ffprobe-osx-arm64 external dependencies: $($ffprobeExternalDependencies -join ', ')"
       }

       function Assert-ConfigureOptionEnabled([string]$option) {
         $buildConfig = & ./ffmpeg-osx-arm64 -buildconf | Out-String
         if ($buildConfig -notmatch [Regex]::Escape($option)) {
           throw "Missing expected FFmpeg configure option: $option"
         }
       }

       Assert-ConfigureOptionEnabled "--enable-gpl"
       Assert-ConfigureOptionEnabled "--enable-libopus"
       Assert-ConfigureOptionEnabled "--enable-libaom"
       Assert-ConfigureOptionEnabled "--enable-libjxl"
       Assert-ConfigureOptionEnabled "--enable-libsvtav1"

       $ffmpegVersion = & ./ffmpeg-osx-arm64 -version | Select-Object -First 1
       $ffprobeVersion = & ./ffprobe-osx-arm64 -version | Select-Object -First 1
       Write-Host "Built $ffmpegVersion"
       Write-Host "Built $ffprobeVersion"
    - uses: actions/upload-artifact@v7
      with:
        name: binaries-ffmpeg-osx-arm64
        if-no-files-found: error
        retention-days: 1
        path: |
           ffmpeg-osx-arm64
           ffprobe-osx-arm64

  ffmpeg-osx-arm64-avif-test:
    runs-on: macos-latest
    needs: [ffmpeg-osx-arm64]
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: binaries-ffmpeg-osx-arm64
        path: .
    - run: |
       chmod +x ffmpeg-osx-arm64
       chmod +x ffprobe-osx-arm64

       @"
       P3
       2 2
       255
       255 0 0   0 255 0
       0 0 255   255 255 255
       "@ | Set-Content -LiteralPath input.ppm

       & ./ffmpeg-osx-arm64 -y -v error -i ./input.ppm -frames:v 1 -c:v libsvtav1 -preset 4 -vf format=yuv420p ./output.avif
       if ($LASTEXITCODE -ne 0) {
         throw "ffmpeg failed to encode input.ppm to AVIF"
       }

       if (-not (Test-Path -LiteralPath ./output.avif -PathType Leaf)) {
         throw "output.avif was not created"
       }

       $outputSize = (Get-Item -LiteralPath ./output.avif).Length
       if ($outputSize -le 0) {
         throw "output.avif is empty"
       }

       $codecName = (& ./ffprobe-osx-arm64 -v error -select_streams v:0 -show_entries stream=codec_name -of default=nokey=1:noprint_wrappers=1 ./output.avif | Out-String).Trim()
       if ($LASTEXITCODE -ne 0) {
         throw "ffprobe failed to inspect output.avif"
       }
       if ($codecName -ne "av1") {
         throw "Unexpected codec for output.avif: '$codecName'"
       }

  prebuilt-docker-linux-x64:
    runs-on: ubuntu-latest
    needs: [zopflipng-linux, oxipng-linux, pngout-linux, ffmpeg-linux, rclone-linux]
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: binaries-zopflipng-linux
        path: .
    - uses: actions/download-artifact@v8
      with:
        name: binaries-oxipng-linux
        path: .
    - uses: actions/download-artifact@v8
      with:
        name: binaries-pngout-linux
        path: .
    - uses: actions/download-artifact@v8
      with:
        name: binaries-ffmpeg-linux
        path: .
    - uses: actions/download-artifact@v8
      with:
        name: binaries-rclone-linux
        path: .
    - run: |
       @"
       FROM ubuntu:24.04
       COPY --chmod=0755 zopfli-linux-x64 /usr/local/bin/zopfli
       COPY --chmod=0755 zopflipng-linux-x64 /usr/local/bin/zopflipng
       COPY --chmod=0755 oxipng-linux-x64 /usr/local/bin/oxipng
       COPY --chmod=0755 pngout-linux-x64 /usr/local/bin/pngout
       COPY --chmod=0755 ffmpeg-linux-x64 /usr/local/bin/ffmpeg
       COPY --chmod=0755 ffprobe-linux-x64 /usr/local/bin/ffprobe
       COPY --chmod=0755 rclone-linux-x64 /usr/local/bin/rclone
       "@ | Set-Content -LiteralPath Dockerfile -NoNewline
    - uses: docker/setup-buildx-action@v4
    - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: ghcr.io/${{ github.repository_owner }}/prebuilt:${{ env.VERSION }}-linux-x64

